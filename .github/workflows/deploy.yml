name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # These files can't be statically exported — remove for preview build only.
      # Local dev and Cloudflare/Vercel production builds are unaffected.
      - name: Remove server-only files for static export
        run: |
          rm -rf app/api
          rm -f app/opengraph-image.tsx

      - name: Build static export
        run: npm run build
        env:
          GITHUB_PAGES: "1"
          NEXT_PUBLIC_GITHUB_PAGES: "1"
          NEXT_PUBLIC_BASE_PATH: "/ms-g-writes"
          # Sanity is optional for the preview — pages show "Coming Soon" states
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: 2025-01-01

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
