name = "msgwrites"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Pages project config — used by `wrangler pages deploy` and local dev.
# Full environment variables live in the Cloudflare dashboard:
#   Pages → msgwrites → Settings → Environment variables
# Mirror every key from .env.local there (both Production and Preview).

[vars]
# Public vars can go here for convenience; secrets must go in the dashboard.
NEXT_PUBLIC_SANITY_DATASET = "production"
NEXT_PUBLIC_SANITY_API_VERSION = "2025-01-01"
NEXT_PUBLIC_SITE_URL = "https://msgwrites.com"
